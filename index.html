<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Adventure - The King of Thieves</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- Greeting Area -->
    <div id="greeting">
        <div class="text-center">
            <h3>Welcome Traveler!</h3>
            <p>Can you break the curse of the King of Thieves?</p>
            <button id="btnStart" class="btn btn-primary btn-lg mt-4">
                Enter the dungeon.
            </button>

            <div id="notify">
                <img src="./images/soundOn.png" alt="">
                <span>Sound On!</span>
            </div>
        </div>
    </div>

    <div id="gameArea">
        <div id="images"></div>

        <div id="text"></div>

        <div id="controls"></div>
    </div>

    <!-- Game Area -->
    <script src="./script.js"></script>
</body>
</html>
